<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIA — Panel TV</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#0a0c10;
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  color:#f0f2f5;
  overflow:hidden;
}

/* SLIDESHOW */
#slideshow { width:100%; height:100%; position:relative; }
.slide {
  position:absolute; inset:0;
  opacity:0; transition:opacity 0.7s ease;
  pointer-events:none;
  display:flex; flex-direction:column;
  background:#0a0c10;
}
.slide.active { opacity:1; pointer-events:auto; }

/* HEADER */
.hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 36px;
  background:#111318;
  border-bottom:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;
}
.logo {
  display:flex; align-items:center; gap:12px;
}
.logo-box {
  width:42px; height:42px;
  background:#e8ff47;
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:14px; color:#0a0c10;
  letter-spacing:-0.5px;
}
.logo-title { font-weight:700; font-size:15px; }
.logo-sub { font-size:10px; color:#555c6e; letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }
.hdr-right { display:flex; align-items:center; gap:28px; }
.hdr-label { font-size:10px; color:#555c6e; letter-spacing:1.5px; text-transform:uppercase; }
.clock { font-size:28px; font-weight:300; letter-spacing:3px; color:#f0f2f5; font-variant-numeric:tabular-nums; }
.clock-date { font-size:11px; color:#8a90a0; text-align:right; margin-top:2px; }

/* PROGRESS */
#prog {
  position:fixed; bottom:0; left:0; height:3px;
  background:#e8ff47; z-index:999;
  transition:width linear;
}

/* DOTS */
#dots {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  display:flex; gap:8px; z-index:999;
}
.dot {
  width:6px; height:6px; border-radius:50%;
  background:#333844; transition:all 0.3s;
}
.dot.on { background:#e8ff47; width:20px; border-radius:3px; }

/* ── GANTT SLIDE ── */
.gantt-body { flex:1; padding:24px 36px 48px; display:flex; flex-direction:column; gap:16px; overflow:hidden; }

.proj-title { font-size:32px; font-weight:800; letter-spacing:-1px; color:#f0f2f5; }
.proj-meta { font-size:11px; color:#555c6e; letter-spacing:1px; text-transform:uppercase; margin-left:12px; }
.proj-tags { display:flex; gap:8px; margin-top:8px; }
.tag {
  font-size:10px; letter-spacing:1px; text-transform:uppercase;
  padding:3px 10px; border-radius:4px; border:1px solid;
}

.gantt-wrap {
  flex:1; background:#111318; border:1px solid rgba(255,255,255,0.07);
  border-radius:12px; overflow:hidden; display:flex; flex-direction:column;
}
.gantt-months {
  display:flex; background:#181c24;
  border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0;
}
.gantt-month {
  font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  color:#555c6e; padding:8px 0; text-align:center; flex:1;
  border-right:1px solid rgba(255,255,255,0.07);
}
.gantt-month:last-child { border-right:none; }
.gantt-month.cur { color:#e8ff47; }
.gantt-month-label { width:180px; flex-shrink:0; border-right:1px solid rgba(255,255,255,0.07); }

.gantt-rows { flex:1; position:relative; overflow:hidden; }

.today-line {
  position:absolute; top:0; bottom:0; width:2px;
  background:#e8ff47; opacity:0.7; z-index:10;
}
.today-tag {
  position:absolute; top:0;
  font-size:9px; color:#e8ff47; background:#0a0c10;
  padding:1px 4px; border-radius:2px;
  transform:translateX(-50%); letter-spacing:1px;
  white-space:nowrap;
}

.g-row {
  display:flex; align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.05);
  min-height:54px; position:relative;
}
.g-row:last-child { border-bottom:none; }

.g-label {
  width:180px; flex-shrink:0;
  display:flex; align-items:center; gap:10px;
  padding:0 14px;
  border-right:1px solid rgba(255,255,255,0.07);
  height:100%;
}
.g-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.g-name { font-size:13px; font-weight:500; color:#f0f2f5; white-space:nowrap; }
.g-resp { font-size:10px; color:#555c6e; margin-left:auto; white-space:nowrap; }

.g-track { flex:1; height:100%; position:relative; }

.g-bar {
  position:absolute; top:50%; transform:translateY(-50%);
  height:24px; border-radius:5px;
  display:flex; align-items:center; padding:0 8px;
  font-size:9px; letter-spacing:0.5px;
  color:rgba(0,0,0,0.75); font-weight:600;
  overflow:hidden; white-space:nowrap;
}

/* ── DASHBOARD SLIDE ── */
.dash-grid {
  flex:1; display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:14px; padding:18px 36px 46px;
  overflow:hidden;
}
.card {
  background:#111318; border:1px solid rgba(255,255,255,0.07);
  border-radius:12px; display:flex; flex-direction:column; overflow:hidden;
}
.card-hdr {
  display:flex; align-items:center; gap:10px;
  padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0;
}
.card-icon {
  width:26px; height:26px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; flex-shrink:0;
}
.card-title { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#8a90a0; }
.card-body { flex:1; padding:12px 16px; overflow:hidden; }

/* projects table */
.ptable { width:100%; border-collapse:collapse; }
.ptable th {
  font-size:9px; letter-spacing:1px; text-transform:uppercase;
  color:#555c6e; text-align:left; padding:0 8px 8px 0; font-weight:400;
}
.ptable td { padding:7px 8px 7px 0; border-top:1px solid rgba(255,255,255,0.05); vertical-align:middle; }
.pname { font-weight:700; font-size:15px; color:#f0f2f5; }
.pbadge {
  display:inline-block; padding:3px 9px; border-radius:4px;
  font-size:10px; letter-spacing:0.5px; font-weight:500;
}
.presp { font-size:13px; color:#8a90a0; }
.pdate { font-size:12px; font-variant-numeric:tabular-nums; }
.d-urgent { color:#ff6b6b; }
.d-soon { color:#f59e0b; }
.d-ok { color:#8a90a0; }

/* calendar */
.cal-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cal-mname { font-size:18px; font-weight:700; color:#f0f2f5; }
.cal-yr { font-size:11px; color:#555c6e; margin-left:6px; }
.cal-legend { display:flex; gap:12px; font-size:9px; letter-spacing:1px; color:#555c6e; align-items:center; }
.cal-legend span { display:flex; align-items:center; gap:4px; }
.cal-legend i { width:6px; height:6px; border-radius:50%; display:inline-block; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-dow { font-size:9px; letter-spacing:1px; color:#555c6e; text-align:center; padding:3px 0 5px; text-transform:uppercase; }
.cday {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  border-radius:5px; font-size:12px; color:#8a90a0; position:relative;
}
.cday.om { opacity:0.3; }
.cday.today { background:#e8ff47; color:#0a0c10; font-weight:700; }
.cday.ev::after, .cday.dl::after, .cday.bt::after {
  content:''; position:absolute; bottom:2px;
  width:4px; height:4px; border-radius:50%;
}
.cday.ev::after { background:#47b4ff; }
.cday.dl::after { background:#ff6b6b; }
.cday.bt::after { background:#f59e0b; }

/* events */
.ev-list { display:flex; flex-direction:column; gap:9px; }
.ev-item { display:flex; gap:10px; align-items:flex-start; }
.ev-dc { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; padding-top:3px; }
.ev-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ev-line { width:1px; flex:1; background:rgba(255,255,255,0.06); min-height:18px; }
.ev-date { font-size:10px; color:#555c6e; letter-spacing:0.5px; margin-bottom:2px; }
.ev-name { font-size:13px; color:#f0f2f5; font-weight:500; line-height:1.3; }

/* avisos */
.av-list { display:flex; flex-direction:column; gap:9px; }
.av { border-radius:8px; padding:10px 12px; border-left:3px solid; }
.av-u { background:rgba(255,107,107,0.08); border-color:#ff6b6b; }
.av-i { background:rgba(71,180,255,0.08); border-color:#47b4ff; }

.av-i .av-lbl { color:#47b4ff; }
.av-o .av-lbl { color:#34d399; }
.av-txt { font-size:13px; line-height:1.5; color:#f0f2f5; }
</style>
</head>

function pad(n){ return String(n).padStart(2,'0'); }

function updateClock(){
  const now = new Date();

// ── CALENDAR ───────────────────────────────────────────────────────────────
function buildCal(c){
  const firstDay = new Date(c.year, c.monthIdx, 1).getDay();
  const total    = new Date(c.year, c.monthIdx+1, 0).getDate();
  const offset   = (firstDay + 6) % 7;
  const today    = new Date();
  const dows = ['L','M','X','J','V','S','D'];
  let html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // blanks
  for(let i=0;i<offset;i++){
    const pd = new Date(c.year, c.monthIdx, -offset+i+1).getDate();
    html += `<div class="cday om">${pd}</div>`;
  }
  for(let d=1;d<=total;d++){
    const isT = today.getFullYear()===c.year && today.getMonth()===c.monthIdx && today.getDate()===d;
    const isDL = c.deadlines.includes(d);
    const isEv = c.events.includes(d);
    let cls = 'cday';
    if(isT) cls+=' today';
    else if(isDL && isEv) cls+=' bt';
    else if(isDL) cls+=' dl';
    else if(isEv) cls+=' ev';
    html += `<div class="${cls}">${d}</div>`;
  }
  const rem = 42 - offset - total;
  for(let i=1;i<=rem;i++) html+=`<div class="cday om">${i}</div>`;
  return `
    <div class="cal-top">
      <div><span class="cal-mname">${c.monthName}</span><span class="cal-yr">${c.year}</span></div>
      <div class="cal-legend">
        <span><i style="background:#ff6b6b;"></i>Entrega</span>
        <span><i style="background:#47b4ff;"></i>Evento</span>
      </div>
    </div>
    <div class="cal-grid">${html}</div>`;
}

}

// ── INIT ───────────────────────────────────────────────────────────────────
const DURATION = 12000;
let cur = 0, timer = null;

const allSlides = [
  ...PROJECTS.map(p => ganttSlide(p)),
  dashSlide()
];
const total = allSlides.length;

const ss   = document.getElementById('slideshow');
const prog = document.getElementById('prog');
const dots = document.getElementById('dots');

ss.innerHTML = allSlides.map((h,i)=>`<div id="s${i}">${h}</div>`).join('');
dots.innerHTML = allSlides.map((_,i)=>`<div class="dot" id="d${i}"></div>`).join('');

// Fix: slides already rendered as inner div, so grab them
document.querySelectorAll('#slideshow > div').forEach(el => {
  // move classes to inner .slide if needed
});

function go(n){
  document.getElementById('s'+cur).querySelector('.slide').classList.remove('active');
  document.getElementById('d'+cur).classList.remove('on');
  cur = ((n % total) + total) % total;
  document.getElementById('s'+cur).querySelector('.slide').classList.add('active');
  document.getElementById('d'+cur).classList.add('on');

  prog.style.transition='none';
  prog.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    prog.style.transition=`width ${DURATION}ms linear`;
    prog.style.width='100%';
  }));
  clearTimeout(timer);
  timer = setTimeout(()=>go(cur+1), DURATION);
}

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' ') go(cur+1);
  if(e.key==='ArrowLeft') go(cur-1);
});

go(0);
updateClock();
setInterval(updateClock, 1000);
</script>
