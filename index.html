<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIA — Panel TV</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#0a0c10;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;color:#f0f2f5;overflow:hidden;}
#slideshow{width:100%;height:100%;position:relative;}
.slide{position:absolute;inset:0;opacity:0;transition:opacity 0.7s ease;pointer-events:none;display:flex;flex-direction:column;background:#0a0c10;}
.slide.active{opacity:1;pointer-events:auto;}
.hdr{display:flex;align-items:center;justify-content:center;padding:22px 40px;background:#111318;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
.logo{display:flex;align-items:center;}
.hdr-right{display:flex;align-items:center;gap:28px;}
.hdr-label{font-size:10px;color:#555c6e;letter-spacing:1.5px;text-transform:uppercase;}
.clock{font-size:36px;font-weight:300;letter-spacing:3px;color:#f0f2f5;font-variant-numeric:tabular-nums;}
.clock-date{font-size:13px;color:#8a90a0;text-align:right;margin-top:3px;}
#prog{position:fixed;bottom:0;left:0;height:3px;background:#e8ff47;z-index:999;transition:width linear;}
#dots{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:999;}
.dot{width:6px;height:6px;border-radius:50%;background:#333844;transition:all 0.3s;}
.dot.on{background:#e8ff47;width:20px;border-radius:3px;}
.gantt-body{flex:1;padding:16px 36px 38px;display:flex;flex-direction:column;gap:12px;overflow:hidden;}
.proj-title{font-size:28px;font-weight:800;letter-spacing:-1px;color:#f0f2f5;}
.proj-tags{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.tag{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:4px;border:1px solid;}
.gantt-wrap{flex:1;background:#111318;border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;}
.phases-bar{display:flex;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07);}
.phases-track{flex:1;display:flex;}
.phase-block{display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;border-right:1px solid rgba(255,255,255,0.07);padding:6px 0;}
.weeks-bar{display:flex;flex-shrink:0;border-bottom:2px solid rgba(255,255,255,0.1);background:#181c24;}
.weeks-track{flex:1;display:flex;overflow:hidden;}
.week-cell{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;color:#555c6e;letter-spacing:0.5px;border-right:1px solid rgba(255,255,255,0.05);padding:6px 0;line-height:1.3;}
.week-cell.cur{color:#e8ff47;background:rgba(232,255,71,0.05);}
.week-num{font-weight:600;}
.week-dates{font-size:7px;opacity:0.7;}
.gantt-rows{flex:1;position:relative;overflow:hidden;}
.g-row{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.05);position:relative;min-height:24px;}
.g-row:last-child{border-bottom:none;}
.g-label{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:0 14px;border-right:1px solid rgba(255,255,255,0.07);height:100%;min-height:24px;}
.g-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.g-name{font-size:12px;font-weight:500;color:#f0f2f5;white-space:normal;line-height:1.3;max-width:140px;}
.g-track{flex:1;height:100%;min-height:44px;position:relative;}
.g-bar{position:absolute;top:50%;transform:translateY(-50%);height:32px;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:11px;color:rgba(0,0,0,0.8);font-weight:600;overflow:hidden;white-space:nowrap;letter-spacing:0.3px;}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#e8ff47;opacity:0.8;z-index:10;pointer-events:none;}
.today-tag{position:absolute;top:0;font-size:9px;color:#e8ff47;background:#0a0c10;padding:1px 5px;border-radius:2px;transform:translateX(-50%);letter-spacing:1px;white-space:nowrap;}
.pl-line{position:absolute;top:0;bottom:0;width:2px;background:#ff4444;opacity:0.9;z-index:10;pointer-events:none;}
.pl-tag{position:absolute;top:0;font-size:9px;color:#ff4444;background:#0a0c10;padding:1px 5px;border-radius:2px;transform:translateX(-50%);letter-spacing:1px;white-space:nowrap;}
#loading{position:fixed;inset:0;background:#0a0c10;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
.loading-text{font-size:12px;color:#555c6e;letter-spacing:2px;text-transform:uppercase;}
.loading-bar-wrap{width:200px;height:2px;background:rgba(255,255,255,0.08);border-radius:1px;}
.loading-bar{height:100%;background:#e8ff47;border-radius:1px;animation:ld 1.5s ease-in-out infinite;}
@keyframes ld{0%{width:0%}50%{width:100%}100%{width:0%;margin-left:100%}}
.dash-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:14px;padding:16px 36px 44px;overflow:hidden;}
.card{background:#111318;border:1px solid rgba(255,255,255,0.07);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
.card-hdr{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.card-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.card-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#8a90a0;}
.card-body{flex:1;padding:12px 16px;overflow:hidden;}
.ptable{width:100%;border-collapse:collapse;}
.ptable th{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#555c6e;text-align:left;padding:0 8px 8px 0;font-weight:400;}
.ptable td{padding:7px 8px 7px 0;border-top:1px solid rgba(255,255,255,0.05);vertical-align:middle;}
.pname{font-weight:700;font-size:15px;color:#f0f2f5;}
.pbadge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:500;}
.presp{font-size:13px;color:#8a90a0;}
.pdate{font-size:12px;font-variant-numeric:tabular-nums;}
.d-urgent{color:#ff6b6b;}.d-soon{color:#f59e0b;}.d-ok{color:#8a90a0;}
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-mname{font-size:18px;font-weight:700;color:#f0f2f5;}
.cal-yr{font-size:11px;color:#555c6e;margin-left:6px;}
.cal-legend{display:flex;gap:12px;font-size:9px;letter-spacing:1px;color:#555c6e;align-items:center;}
.cal-legend span{display:flex;align-items:center;gap:4px;}
.cal-legend i{width:6px;height:6px;border-radius:50%;display:inline-block;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{font-size:9px;letter-spacing:1px;color:#555c6e;text-align:center;padding:3px 0 5px;text-transform:uppercase;}
.cday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:12px;color:#8a90a0;position:relative;}
.cday.om{opacity:0.3;}.cday.today{background:#e8ff47;color:#0a0c10;font-weight:700;}
.cday.ev::after,.cday.dl::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;}
.cday.ev::after{background:#47b4ff;}.cday.dl::after{background:#ff6b6b;}
.ev-list{display:flex;flex-direction:column;gap:9px;}
.ev-item{display:flex;gap:10px;align-items:flex-start;}
.ev-dc{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;padding-top:3px;}
.ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ev-line{width:1px;flex:1;background:rgba(255,255,255,0.06);min-height:18px;}
.ev-date{font-size:10px;color:#555c6e;letter-spacing:0.5px;margin-bottom:2px;}
.ev-name{font-size:13px;color:#f0f2f5;font-weight:500;line-height:1.3;}
.av-list{display:flex;flex-direction:column;gap:9px;}
.av{border-radius:8px;padding:10px 12px;border-left:3px solid;}
.av-u{background:rgba(255,107,107,0.08);border-color:#ff6b6b;}
.av-i{background:rgba(71,180,255,0.08);border-color:#47b4ff;}
.av-o{background:rgba(52,211,153,0.08);border-color:#34d399;}
.av-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.av-u .av-lbl{color:#ff6b6b;}.av-i .av-lbl{color:#47b4ff;}.av-o .av-lbl{color:#34d399;}
.av-txt{font-size:13px;line-height:1.5;color:#f0f2f5;}
#pinscreen{position:fixed;inset:0;background:#0a0c10;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:24px;}
#pinscreen.hidden{display:none;}
.pin-title{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#555c6e;}
.pin-dots{display:flex;gap:14px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#1e2330;border:1px solid #333844;transition:all 0.15s;}
.pin-dot.filled{background:#e8ff47;border-color:#e8ff47;}
.pin-error{font-size:11px;color:#ff4444;letter-spacing:2px;text-transform:uppercase;opacity:0;transition:opacity 0.3s;}
.pin-error.show{opacity:1;}
#controls{position:fixed;bottom:32px;right:40px;display:flex;align-items:center;gap:12px;z-index:998;opacity:0;transition:opacity 0.4s;}
#controls.visible{opacity:1;}
.ctrl-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#f0f2f5;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.ctrl-btn:hover{background:rgba(255,255,255,0.18);}
.ctrl-btn.play-pause{width:52px;height:52px;font-size:18px;background:rgba(232,255,71,0.12);border-color:#e8ff47;color:#e8ff47;}
.ctrl-btn.play-pause:hover{background:rgba(232,255,71,0.25);}
</style>

<script>
const PIN='262626';
let pinEntry='';
function pinKey(k){
  if(pinEntry.length>=6) return;
  pinEntry+=k;
  document.getElementById('pd'+(pinEntry.length-1)).classList.add('filled');
  if(pinEntry.length===6){
    if(pinEntry===PIN){
      document.getElementById('pinscreen').classList.add('hidden');
    } else {
      document.getElementById('pinerror').classList.add('show');
      setTimeout(()=>{
        pinEntry='';
        document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('filled'));
        document.getElementById('pinerror').classList.remove('show');
      },800);
    }
  }
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('pinscreen').classList.contains('hidden')) return;
  if(e.key>='0'&&e.key<='9') pinKey(e.key);
  if(e.key==='Backspace'&&pinEntry.length>0){
    pinEntry=pinEntry.slice(0,-1);
    document.getElementById('pd'+pinEntry.length).classList.remove('filled');
  }
});
const SIA_SVG = '<img src="Logotipo-Color-Horizontal-Negativo_RGB72.svg" style="height:100px;width:auto;display:block;">';

const DEPT_COLORS = {
  'INGESTA + MONTAJE GUION':'#3b82f6',

  'BSO':'#ec4899',
  'CONFORM':'#8b5cf6',

const PHASE_COLORS = {

  'PRE':{bg:'rgba(59,130,246,0.2)',color:'#60a5fa'},

const PROJ_COLORS = ['#e8ff47','#47b4ff','#a78bfa','#34d399'];

const DAYS_ES=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTHS_ES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function pad(n){return String(n).padStart(2,'0');}

function updateClock(){
  const now=new Date();
  const t=pad(now.getHours())+':'+pad(now.getMinutes());
  const d=DAYS_ES[now.getDay()]+', '+now.getDate()+' de '+MONTHS_ES[now.getMonth()]+' de '+now.getFullYear();
  document.querySelectorAll('.clock').forEach(el=>el.textContent=t);
  document.querySelectorAll('.clock-date').forEach(el=>el.textContent=d);
}

function hdr(label){
  return '<div class="hdr"><div class="logo">'+SIA_SVG+'</div><div class="hdr-right">'+(label?'<div class="hdr-label">'+label+'</div>':'')+'<div><div class="clock">00:00</div><div class="clock-date"></div></div></div></div>';
}

async function loadExcel(url){
  const resp = await fetch(url);
  const buf  = await resp.arrayBuffer();
  const data = new Uint8Array(buf);
  const wb   = XLSX.read(data,{type:'array'});
  const ws   = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

  const projectId = wb.SheetNames[0];

  const weeksRaw = rows[3].slice(2);
  const weeks = [];
  weeksRaw.forEach((cell,i)=>{
    if(!cell) return;
    const parts = String(cell).split('\n');
    const label = parts[0].trim();
    const dates = parts[1]?parts[1].trim():'';
    if(label.startsWith('S')) weeks.push({num:i+1,label,dates});
  });
  const totalWeeks = weeks.length;

  const phasesRaw = rows[4].slice(2);

  const today = new Date();
  let todayWeekNum = null;
  weeks.forEach(w=>{
    if(todayWeekNum||!w.dates) return;
    const parts = w.dates.split('-');
    if(parts.length<2) return;
    try{
      const ed = parts[1].trim().split('/');
      const yr = (parseInt(ed[1])<=3&&w.num>40)?2027:2026;
      const endDate = new Date(yr,parseInt(ed[1])-1,parseInt(ed[0]));
      if(today<=endDate) todayWeekNum=w.num;
    }catch(e){}
  });

  const depts=[];
  for(let r=5;r<rows.length;r++){
    const row=rows[r];
    if(!row||!row[0]) continue;
    const name=String(row[0]).trim();
    if(!name) continue;
    let startW=null,endW=null,plWeek=null;
    row.slice(2).forEach((cell,i)=>{
      if(i>=totalWeeks) return;
      if(cell!==null&&cell!==undefined&&String(cell).trim()!==''){
        if(startW===null) startW=i+1;
        endW=i+1;
        if(name==='MONTAJE'&&String(cell).includes('PL')) plWeek=i+1;
      }
    });
    if(startW!==null) depts.push({name,startW,endW,plWeek,color:DEPT_COLORS[name]||'#6b7280'});
  }

  return {projectId,weeks,totalWeeks,phasesRaw,todayWeekNum,depts};
}

function isoWeekToFriday(weekNum){
  const year=new Date().getFullYear();
  const jan4=new Date(year,0,4);
  const monday=new Date(jan4);
  monday.setDate(jan4.getDate()-((jan4.getDay()+6)%7)+(weekNum-1)*7);
  const friday=new Date(monday);
  friday.setDate(monday.getDate()+4);
  return friday.getFullYear()+'/'+(String(friday.getMonth()+1).padStart(2,'0'))+'/'+String(friday.getDate()).padStart(2,'0');
}

function renderGantt(data){
  const {projectId,weeks,totalWeeks,phasesRaw,todayWeekNum,depts}=data;
  const LW=200;

  const phaseGroups=[];
  let curPh=null;
  phasesRaw.forEach((p,i)=>{
    if(i>=totalWeeks||!p) return;
    if(!curPh||curPh.phase!==p){curPh={phase:p,start:i,count:1};phaseGroups.push(curPh);}
    else curPh.count++;
  });

  const phasesHtml=phaseGroups.map(g=>{
    const st=PHASE_COLORS[g.phase]||{bg:'rgba(255,255,255,0.05)',color:'#8a90a0'};
    return '<div class="phase-block" style="flex:'+g.count+';background:'+st.bg+';color:'+st.color+';">'+g.phase+'</div>';
  }).join('');

  const weeksHtml=weeks.map((w,i)=>{
    const isCur=w.num===todayWeekNum;
    const show=(i%2===0)||isCur;
    return '<div class="week-cell '+(isCur?'cur':'')+'" style="flex:1;"><div class="week-num">'+(show?w.label:'')+'</div><div class="week-dates">'+(show&&w.dates?w.dates:'')+'</div></div>';
  }).join('');

  const todayPct=todayWeekNum?(((todayWeekNum-0.5)/totalWeeks)*100).toFixed(2):null;
  const montaje=depts.find(d=>d.name==='MONTAJE');
const plPct=(montaje&&montaje.endW)?((montaje.endW/totalWeeks)*100).toFixed(2):null;
  const plWeekData=plPct!==null?weeks.find(w=>w.num===montaje.endW):null;
  const plDateStr=plWeekData?isoWeekToFriday(plWeekData.num):'';  
  const rowsHtml=depts.map(dept=>{
    const lp=((dept.startW-1)/totalWeeks*100).toFixed(2);
    const wp=((dept.endW-dept.startW+1)/totalWeeks*100).toFixed(2);
return '<div class="g-row"><div class="g-label" style="width:'+LW+'px;"><div class="g-dot" style="background:'+dept.color+';"></div><div class="g-name">'+dept.name.replace('INGESTA + MONTAJE GUION','INGESTA +<br>MONTAJE GUIÓN')+'</div></div><div class="g-track"><div class="g-bar" style="left:'+lp+'%;width:calc('+wp+'% - 3px);background:'+dept.color+';">'+dept.name+'</div></div></div>';  }).join('');

  const todayLine=todayPct!==null?'<div class="today-line" style="left:calc('+LW+'px + (100% - '+LW+'px) * '+todayPct+' / 100);"><div class="today-tag">HOY</div></div>':'';
const plLine=plPct!==null?'<div class="pl-line" style="left:calc('+LW+'px + (100% - '+LW+'px) * '+plPct+' / 100);"><div class="pl-tag">PL '+(plDateStr||'')+'</div></div>':'';
  return '<div class="slide">'+hdr('Proyecto '+projectId)+'<div class="gantt-body"><div><div style="display:flex;align-items:baseline;gap:10px;"><div class="proj-title">'+projectId+'</div></div><div class="proj-tags" style="margin-top:8px;"><div class="tag" style="color:#34d399;border-color:#34d399;background:rgba(52,211,153,0.08);">EN PRODUCCIÓN</div><div class="tag" style="color:#555c6e;border-color:rgba(255,255,255,0.1);">'+totalWeeks+' SEMANAS</div>'+(todayWeekNum?'<div class="tag" style="color:#e8ff47;border-color:#e8ff47;background:rgba(232,255,71,0.06);">S'+pad(todayWeekNum)+' — SEMANA ACTUAL</div>':'')+'</div></div><div class="gantt-wrap"><div class="phases-bar"><div style="width:'+LW+'px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07);background:#0d1017;"></div><div class="phases-track">'+phasesHtml+'</div></div><div class="weeks-bar"><div style="width:'+LW+'px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07);"></div><div class="weeks-track">'+weeksHtml+'</div></div><div class="gantt-rows" style="flex:1;position:relative;overflow:hidden;">'+todayLine+plLine+rowsHtml+'</div></div></div></div>';
}

function renderOverview(projects){
  let globalMin=Infinity,globalMax=0;
  projects.forEach(p=>p.depts.forEach(d=>{
    if(d.startW<globalMin)globalMin=d.startW;
    if(d.endW>globalMax)globalMax=d.endW;
  }));
  const span=globalMax-globalMin+1;
  const LW=200;
  const todayWeek=projects[0].todayWeekNum;
  const todayPct=todayWeek?(((todayWeek-globalMin+0.5)/span)*100).toFixed(2):null;

  const rowsHtml=projects.map((p,pi)=>{
    const color=PROJ_COLORS[pi];
    const allStart=Math.min(...p.depts.map(d=>d.startW));
    const allEnd=Math.max(...p.depts.map(d=>d.endW));
    const lp=(((allStart-globalMin)/span)*100).toFixed(2);
    const wp=(((allEnd-allStart+1)/span)*100).toFixed(2);
    const subBars=p.depts.map(d=>{
      const dl=(((d.startW-globalMin)/span)*100).toFixed(2);
      const dw=(((d.endW-d.startW+1)/span)*100).toFixed(2);
      const dc=DEPT_COLORS[d.name]||'#6b7280';
      return '<div style="position:absolute;top:50%;transform:translateY(-50%);left:'+dl+'%;width:calc('+dw+'% - 2px);height:18px;border-radius:3px;background:'+dc+';opacity:0.8;" title="'+d.name+'"></div>';
    }).join('');
    const montaje=p.depts.find(d=>d.name==='MONTAJE');
    const plPctRow=montaje?(((montaje.endW-globalMin+1)/span)*100).toFixed(2):null;
    const plWeekDataRow=montaje?p.weeks.find(w=>w.num===montaje.endW):null;
    const plDateStrRow=plWeekDataRow?isoWeekToFriday(plWeekDataRow.num):'';
    const plBarRow=plPctRow!==null?'<div style="position:absolute;top:50%;bottom:-9999px;width:2px;left:'+plPctRow+'%;background:#ff4444;opacity:0.9;z-index:5;"><div style="position:absolute;top:0;font-size:9px;color:#ff4444;background:#0a0c10;padding:1px 4px;border-radius:2px;transform:translateX(-50%);letter-spacing:1px;white-space:nowrap;">PL '+(plDateStrRow||'')+'</div></div>':'';
    return '<div class="g-row" style="min-height:90px;overflow:visible;"><div class="g-label" style="width:'+LW+'px;"><div class="g-dot" style="background:'+color+';width:10px;height:10px;flex-shrink:0;"></div><div style="display:flex;flex-direction:column;gap:2px;"><div style="font-size:14px;font-weight:700;color:'+color+';">'+p.projectId+'</div><div style="font-size:9px;color:#555c6e;">S'+pad(allStart)+' → S'+pad(allEnd)+'</div></div></div><div class="g-track" style="position:relative;overflow:visible;"><div style="position:absolute;top:50%;transform:translateY(-50%);left:'+lp+'%;width:calc('+wp+'% - 2px);height:34px;border-radius:5px;background:'+color+'18;border:1px solid '+color+'30;"></div>'+subBars+plBarRow+'</div></div>';
  }).join('');

  const refWeeks=projects[0].weeks;
  const gridHtml=refWeeks.filter((_,i)=>i%4===0).map(w=>{
    const pct=(((w.num-globalMin)/span)*100).toFixed(2);
    return '<div style="position:absolute;left:'+pct+'%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.04);"></div>';
  }).join('');
  const axisHtml=refWeeks.filter((_,i)=>i%4===0).map(w=>{
    const pct=(((w.num-globalMin)/span)*100).toFixed(2);
    return '<div style="position:absolute;left:'+pct+'%;top:0;font-size:8px;color:#555c6e;transform:translateX(-50%);white-space:nowrap;">'+w.label+'</div>';
  }).join('');

  const legendHtml=Object.entries(DEPT_COLORS).map(([name,color])=>'<span style="display:flex;align-items:center;gap:5px;font-size:9px;color:#8a90a0;"><span style="width:8px;height:8px;border-radius:2px;background:'+color+';display:inline-block;flex-shrink:0;"></span>'+name+'</span>').join('');
  const todayLine=todayPct!==null?'<div class="today-line" style="left:calc('+LW+'px + (100% - '+LW+'px) * '+todayPct+' / 100);"><div class="today-tag">HOY</div></div>':'';

  return '<div class="slide">'+hdr('Vista General — Todos los Proyectos')+'<div class="gantt-body"><div><div class="proj-title" style="font-size:24px;">Solapamiento de Postproducción</div><div style="font-size:11px;color:#555c6e;margin-top:4px;letter-spacing:1px;text-transform:uppercase;">Semanas S'+pad(globalMin)+' — S'+pad(globalMax)+' · '+span+' semanas totales</div></div><div class="gantt-wrap"><div style="display:flex;background:#181c24;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;"><div style="width:'+LW+'px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07);"></div><div style="flex:1;position:relative;height:28px;">'+axisHtml+'</div></div><div class="gantt-rows" style="flex:1;position:relative;overflow:hidden;">'+gridHtml+todayLine+rowsHtml+'</div></div><div style="display:flex;flex-wrap:wrap;gap:12px;padding-top:4px;">'+legendHtml+'</div></div></div>';
}

function buildCal(c){
  const firstDay=new Date(c.year,c.monthIdx,1).getDay();
  const total=new Date(c.year,c.monthIdx+1,0).getDate();
  const offset=(firstDay+6)%7;
  const today=new Date();
  const dows=['L','M','X','J','V','S','D'];
  let html=dows.map(d=>'<div class="cal-dow">'+d+'</div>').join('');
  for(let i=0;i<offset;i++){const pd=new Date(c.year,c.monthIdx,-offset+i+1).getDate();html+='<div class="cday om">'+pd+'</div>';}
  for(let d=1;d<=total;d++){
    const isT=today.getFullYear()===c.year&&today.getMonth()===c.monthIdx&&today.getDate()===d;
    const isDL=c.deadlines.includes(d),isEv=c.events.includes(d);
    let cls='cday';
    if(isT) cls+=' today';
    else if(isDL) cls+=' dl';
    else if(isEv) cls+=' ev';
    html+='<div class="'+cls+'">'+d+'</div>';
  }
  const rem=42-offset-total;
  for(let i=1;i<=rem;i++) html+='<div class="cday om">'+i+'</div>';
  return '<div class="cal-top"><div><span class="cal-mname">'+c.monthName+'</span><span class="cal-yr">'+c.year+'</span></div><div class="cal-legend"><span><i style="background:#ff6b6b;"></i>Entrega</span><span><i style="background:#47b4ff;"></i>Evento</span></div></div><div class="cal-grid">'+html+'</div>';
}

function renderDash(){
  const d=DASH;
  const projRows=d.projects.map(p=>'<tr><td class="pname">'+p.name+'</td><td><span class="pbadge" style="color:'+p.pc+';background:'+p.pb+';">'+p.phase+'</span></td><td class="presp">'+p.resp+'</td><td class="pdate d-'+p.urg+'" style="text-align:right;">'+p.date+'</td></tr>').join('');
  const evHtml=d.events.map((ev,i)=>'<div class="ev-item"><div class="ev-dc"><div class="ev-dot" style="background:'+ev.color+';"></div>'+(i<d.events.length-1?'<div class="ev-line"></div>':'')+'</div><div><div class="ev-date">'+ev.date+'</div><div class="ev-name">'+ev.name+'</div></div></div>').join('');
  const avHtml=d.avisos.map(av=>'<div class="av av-'+av.type+'"><div class="av-lbl">'+av.label+'</div><div class="av-txt">'+av.text+'</div></div>').join('');
  return '<div class="slide">'+hdr('Resumen del Departamento')+'<div class="dash-grid"><div class="card"><div class="card-hdr"><div class="card-icon" style="background:rgba(232,255,71,0.12);color:#e8ff47;font-size:16px;">≡</div><div class="card-title">Proyectos Activos</div></div><div class="card-body"><table class="ptable"><thead><tr><th>Proyecto</th><th>Fase</th><th>Resp.</th><th style="text-align:right">Entrega</th></tr></thead><tbody>'+projRows+'</tbody></table></div></div><div class="card"><div class="card-hdr"><div class="card-icon" style="background:rgba(71,180,255,0.12);color:#47b4ff;font-size:16px;">▦</div><div class="card-title">Calendario — '+d.cal.monthName+' '+d.cal.year+'</div></div><div class="card-body">'+buildCal(d.cal)+'</div></div><div class="card"><div class="card-hdr"><div class="card-icon" style="background:rgba(167,139,250,0.12);color:#a78bfa;font-size:16px;">◎</div><div class="card-title">Próximos Eventos</div></div><div class="card-body"><div class="ev-list">'+evHtml+'</div></div></div><div class="card"><div class="card-hdr"><div class="card-icon" style="background:rgba(255,107,107,0.12);color:#ff6b6b;font-size:18px;font-weight:700;">!</div><div class="card-title">Avisos del Departamento</div></div><div class="card-body"><div class="av-list">'+avHtml+'</div></div></div></div></div>';
}

const DURATION=14000;
let cur=0,timer=null,paused=false,hideTimer=null;

function showControls(){
  document.getElementById('controls').classList.add('visible');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>document.getElementById('controls').classList.remove('visible'),3000);
}

document.addEventListener('mousemove',showControls);
document.addEventListener('keydown',showControls);

function go(n){
  const slides=document.querySelectorAll('.slide');
  const dotEls=document.querySelectorAll('.dot');
  if(!slides.length) return;
  slides[cur].classList.remove('active');
  dotEls[cur]&&dotEls[cur].classList.remove('on');
  cur=((n%slides.length)+slides.length)%slides.length;
  slides[cur].classList.add('active');
  dotEls[cur]&&dotEls[cur].classList.add('on');
  const prog=document.getElementById('prog');
  if(!paused){
    prog.style.transition='none';prog.style.width='0%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{prog.style.transition='width '+DURATION+'ms linear';prog.style.width='100%';}));
    clearTimeout(timer);
    timer=setTimeout(()=>go(cur+1),DURATION);
  } else {
    prog.style.transition='none';prog.style.width='0%';
  }
}

function togglePause(){
  paused=!paused;
  const btn=document.getElementById('btnPlay');
  if(paused){
    clearTimeout(timer);
    document.getElementById('prog').style.transition='none';
    document.getElementById('prog').style.width='0%';
    btn.innerHTML='&#9654;';
  } else {
    btn.innerHTML='&#10074;&#10074;';
    go(cur);
  }
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('pinscreen')&&!document.getElementById('pinscreen').classList.contains('hidden')) return;
  if(e.key==='ArrowRight'||e.key===' ') go(cur+1);
  if(e.key==='ArrowLeft') go(cur-1);
  if(e.key==='p'||e.key==='P') togglePause();
  if(e.key==='f'||e.key==='F'){
    const el=document.documentElement;
    const isFS=document.fullscreenElement||document.webkitFullscreenElement;
    if(isFS){(document.exitFullscreen||document.webkitExitFullscreen).call(document);}
    else{(el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);}
  }
});
document.getElementById('btnPrev').addEventListener('click',()=>{showControls();go(cur-1);});
document.getElementById('btnNext').addEventListener('click',()=>{showControls();go(cur+1);});
document.getElementById('btnPlay').addEventListener('click',()=>{showControls();togglePause();});
document.addEventListener('click',function onFirst(){
  (document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen||function(){}).call(document.documentElement);
  document.removeEventListener('click',onFirst);
},{once:true});

async function init(){
  try{
    const [data1,data2,data3,data4]=await Promise.all([
      loadExcel('2601_MIZ_POSTCALENDAR.xlsx'),
      loadExcel('2602_DES_POSTCALENDAR.xlsx'),
      loadExcel('2603_LAC_POSTCALENDAR.xlsx'),
      loadExcel('2604_ADD_POSTCALENDAR.xlsx'),
    ]);
    const ss=document.getElementById('slideshow');
    const dots=document.getElementById('dots');
    const allSlides=[
      renderGantt(data1),
      renderGantt(data2),
      renderGantt(data3),
      renderGantt(data4),
      renderOverview([data1,data2,data3,data4]),
      renderDash()
    ];
    ss.innerHTML=allSlides.join('');
    dots.innerHTML=allSlides.map((_,i)=>'<div class="dot" id="d'+i+'"></div>').join('');
    document.getElementById('loading').style.display='none';
    updateClock();
    setInterval(updateClock,1000);
    go(0);
  }catch(err){
    console.error('Error:',err);
    document.querySelector('.loading-text').textContent='Error cargando datos: '+err.message;
  }
}

init();
